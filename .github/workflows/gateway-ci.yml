name: gateway-ci

on:
  push:
    paths:
      - 'gateway/**'
      - 'deploy/**'
      - '.github/workflows/gateway-ci.yml'
  pull_request:
    paths:
      - 'gateway/**'
      - 'deploy/**'
      - '.github/workflows/gateway-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: go1.26.1
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          check-latest: true
          cache: true

      - name: Go test
        run: go test ./...

      - name: Go test (race)
        run: go test -race ./...

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26.1'
          work-dir: gateway
